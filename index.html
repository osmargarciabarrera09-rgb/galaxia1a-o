<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Galaxia para ti</title>
  <meta name="description" content="Galaxia interactiva de frases de cariño 💘">
  <meta property="og:title" content="Galaxia para ti">
  <meta property="og:description" content="Una galaxia interactiva con palabras de cariño 💖">
  <meta property="og:image" content="og-cover.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="edicion.css">
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

<canvas id="galaxy-canvas"></canvas>
<div class="pill">1 año mi amor hermosa</div>
<div class="attribution">Base: tlanex · Adaptación para Jotab 💫</div>
<div id="err" class="error"></div>

<div id="planet-modal" class="hidden">
  <h2>¡Has descubierto un secreto! 💖</h2>
  <p>Toca el botón para continuar nuestro viaje...</p>
  <a href="capitulo2.html" class="chapter-btn">Capítulo 2: Nuestro Primer Año ✨</a>
  <button id="close-modal">Volver a la galaxia</button>
</div>

<div class="player">
  <button id="playBtn">▶︎</button>
  <span style="font-size:12px;opacity:.9">Elije tu cancion  <b>cancion.mp3</b> Detalles Mr <b>💙🌹♥️</b></span>
  <input type="file" id="pickFile" accept="audio/*">
  <button id="pickBtn">Elegir canción</button>
  <audio id="audio" preload="none">
    <source src="ahi_estabas_tu.mp3" type="audio/mpeg">
  </audio>
</div>

<canvas id="fx" style="position:fixed;inset:0;pointer-events:none;"></canvas>

<script src="amor.js"></script>
</body>
</html>
